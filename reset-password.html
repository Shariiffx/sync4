<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — FlowSync</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--bg2:#0f0f1a;--bg3:#161624;--bg4:#1e1e30;
  --border:#252538;--border2:#32324a;
  --text:#f0f0fa;--text2:#8888aa;--text3:#4a4a66;
  --accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00b894;--green3:#002f25;--green2:#00634f;
  --red:#e17055;--red2:#6b2a1a;
  --r:8px;--r2:14px;--r3:20px;
  font-family:'Outfit',sans-serif;color:var(--text);
}
body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:10px 14px;font-family:'Outfit',sans-serif;font-size:14px;width:100%;outline:none;transition:all .2s}
input:focus{border-color:var(--accent);background:var(--bg4)}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;border-radius:var(--r);padding:10px 18px;font-size:14px;font-weight:500;transition:all .15s;width:100%}
.btn-p{background:var(--accent);color:#fff;padding:12px}.btn-p:hover{background:var(--accent2);color:#000}
.btn-p:disabled{opacity:.4;cursor:default}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.field{margin-bottom:14px}
.logo{font-size:24px;font-weight:600;letter-spacing:-.3px;text-align:center;margin-bottom:6px}
.logo em{color:var(--accent);font-style:normal}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:28px;width:100%;max-width:360px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{padding:12px 14px;border-radius:var(--r);font-size:13px;margin-bottom:14px}
.msg-err{background:var(--red2);border:1px solid #5a2010;color:var(--red)}
.msg-ok{background:var(--green3);border:1px solid var(--green2);color:var(--green)}
.strength-bar{height:4px;border-radius:2px;background:var(--bg4);margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:all .3s}
</style>
</head>
<body>
<div class="card">
  <div class="logo">flow<em>sync</em></div>
  <div style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px">Set a new password</div>

  <!-- Loading state -->
  <div id="state-loading" style="text-align:center;padding:20px">
    <span class="spin"></span>
    <div style="font-size:13px;color:var(--text2);margin-top:10px">Verifying reset link…</div>
  </div>

  <!-- Invalid token -->
  <div id="state-invalid" style="display:none">
    <div class="msg msg-err">This reset link is invalid or has expired.</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:18px">Reset links expire after 1 hour. Please request a new one from the login page.</div>
    <a href="index.html" style="display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;padding:12px;border-radius:var(--r);font-weight:500;font-size:14px">Back to login</a>
  </div>

  <!-- Reset form -->
  <div id="state-form" style="display:none">
    <div style="font-size:13px;color:var(--text2);margin-bottom:18px">Resetting password for <strong id="reset-username" style="color:var(--accent2)"></strong></div>
    <div id="form-err" style="display:none" class="msg msg-err"></div>
    <div class="field">
      <label>New password</label>
      <input type="password" id="new-pass" placeholder="Enter new password (min 6 chars)" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')doReset()"/>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px" id="strength-label"></div>
    </div>
    <div class="field">
      <label>Confirm new password</label>
      <input type="password" id="confirm-pass" placeholder="Repeat your new password" onkeydown="if(event.key==='Enter')doReset()"/>
    </div>
    <button class="btn-p" id="btn-reset" onclick="doReset()">Set new password</button>
  </div>

  <!-- Success -->
  <div id="state-success" style="display:none">
    <div class="msg msg-ok" style="text-align:center;padding:16px">
      <div style="font-size:20px;margin-bottom:8px">✓</div>
      <div style="font-weight:600;margin-bottom:4px">Password updated!</div>
      <div style="font-size:12px;opacity:.8">You can now log in with your new password.</div>
    </div>
    <a href="index.html" style="display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;padding:12px;border-radius:var(--r);font-weight:500;font-size:14px">Go to login</a>
  </div>
</div>

<script>
// Use relative URL so it works whether accessed via localhost:3001 or any host
const API = window.location.origin + '/api';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

async function call(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function show(state) {
  ['loading', 'invalid', 'form', 'success'].forEach(s =>
    document.getElementById('state-' + s).style.display = s === state ? 'block' : 'none'
  );
}

function checkStrength(pw) {
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  if (!pw) { fill.style.width = '0%'; label.textContent = ''; return; }
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w: '20%', c: '#e17055', t: 'Very weak' },
    { w: '40%', c: '#e17055', t: 'Weak' },
    { w: '60%', c: '#fdcb6e', t: 'Fair' },
    { w: '80%', c: '#a29bfe', t: 'Good' },
    { w: '100%', c: '#00b894', t: 'Strong' },
  ];
  const l = levels[Math.min(score, 4)];
  fill.style.width = l.w; fill.style.background = l.c;
  label.textContent = l.t; label.style.color = l.c;
}

async function doReset() {
  const pass = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const errEl = document.getElementById('form-err');
  errEl.style.display = 'none';

  if (!pass || !confirm) { errEl.textContent = 'Please fill in both fields'; errEl.style.display = 'block'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return; }
  if (pass !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Updating…';
  try {
    await call('POST', '/auth/reset-password', { token, password: pass });
    show('success');
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.disabled = false; btn.innerHTML = 'Set new password';
  }
}

// Verify token on page load
(async () => {
  if (!token) { show('invalid'); return; }
  try {
    const d = await call('GET', '/auth/verify-token/' + token);
    document.getElementById('reset-username').textContent = '@' + d.username;
    show('form');
  } catch (e) {
    show('invalid');
  }
})();
</script>
</body>
</html>
